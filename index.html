<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع رفيدة المطور ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background-color: #0b0e14;
            color: #ffffff; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; text-align: center; position: relative;
        }

        /* خلفية النجوم المتساقطة بكثافة */
        .star {
            position: absolute; background: white; border-radius: 50%;
            z-index: 0; pointer-events: none; animation: moveStar linear infinite;
        }
        @keyframes moveStar { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }

        .step, .final-card, .btn { position: relative; z-index: 10; }

        .btn {
            padding: 12px 25px; font-size: 1.1rem; color: white; border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s; margin: 8px; outline: none;
        }
        .btn-green { background-color: #28a745; }
        .btn-choice { background-color: #007bff; }
        .btn-red { background-color: #dc3545; }
        .btn-orange { background-color: #fd7e14; font-weight: bold; }
        .btn-back { background-color: #2d2d2d; color: #fff; border: 1px solid #444; font-size: 0.9rem; }

        .hidden { display: none; }

        .final-card {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px);
            padding: 35px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 85%; min-width: 280px; margin: 10px auto;
        }

        .game-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .box {
            width: 65px; height: 65px; background: #1a1f29; border: 2px solid #007bff;
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; cursor: pointer; transition: 0.2s;
        }

        /* تأثيرات الانفجار العشوائي ×100 */
        .effect {
            position: fixed; pointer-events: none; z-index: 1000;
            animation: effectAnimRandom 2s ease-out forwards;
        }
        @keyframes effectAnimRandom {
            0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(2.5) rotate(var(--tr)); opacity: 0; }
        }

        #toast {
            position: fixed; bottom: 20px; background: rgba(220, 53, 69, 0.9);
            color: white; padding: 10px 20px; border-radius: 10px;
            transition: 0.3s; opacity: 0; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="toast">ممنوع ❌</div>

    <div id="step1" class="step">
        <button class="btn btn-green" onclick="btnAction('hearts', 'step2')">اهلااا منورة الموقع</button>
    </div>

    <div id="step2" class="step hidden">
        <div class="final-card">
            <p>اهلا بيكك المهم وش باغية يكون اسمك؟</p>
            <button class="btn btn-choice" onclick="btnAction('magic', 'step3')">رفيدة</button>
            <button class="btn btn-red" onclick="btnAction('error', 'step-final', 'lara')">لارا</button>
        </div>
    </div>

    <div id="step3" class="step hidden">
        <div class="final-card">
            <p>باغية تلعبي لعبة؟</p>
            <button class="btn btn-green" onclick="btnAction('magic', 'step-play', 'initGame')">نعم</button>
            <button class="btn btn-red" onclick="btnAction('tears', 'step-final', 'noGame')">لا</button>
        </div>
    </div>

    <div id="step-play" class="step hidden">
        <div class="final-card">
            <p>خمني وين راهي الهدية؟ ✨</p>
            <div class="game-container">
                <div id="box0" class="box" onclick="checkGame(0)">؟</div>
                <div id="box1" class="box" onclick="checkGame(1)">؟</div>
                <div id="box2" class="box" onclick="checkGame(2)">؟</div>
            </div>
            <p id="game-status" style="margin-top:15px;"></p>
            <button id="win-btn" class="btn btn-orange hidden" onclick="btnAction('fire', 'step-love')">ويي لقيتيها! 🔥</button>
        </div>
    </div>

    <div id="step-love" class="step hidden">
        <div class="final-card">
            <p>يادرا نستاهل كلمة نشتيك😖⁉️</p>
            <button class="btn btn-green" onclick="btnAction('hearts', 'step-love-yes')">نعم</button>
            <button class="btn btn-red" onclick="btnAction('tears', 'step-love-no')">لا</button>
        </div>
    </div>

    <div id="step-love-yes" class="step hidden">
        <div class="final-card">
            <p style="font-size: 1.5rem;">صحيتيييييي 😍</p>
            <button class="btn btn-choice" onclick="btnAction('magic', 'step-feedback')">المهم عجبك؟</button>
        </div>
    </div>

    <div id="step-love-no" class="step hidden">
        <div class="final-card">
            <p>معليش على راحتك 😔</p>
            <button class="btn btn-choice" onclick="btnAction('magic', 'step-feedback')">المهم عجبك؟</button>
        </div>
    </div>

    <div id="step-feedback" class="step hidden">
        <div class="final-card">
            <p>المهم عجبك؟</p>
            <button class="btn btn-green" onclick="btnAction('magic', 'step-feedback-yes')">نعم</button>
            <button class="btn btn-red" onclick="showForbidden()">لا</button>
        </div>
    </div>

    <div id="step-feedback-yes" class="step hidden">
        <div class="final-card">
            <p style="font-size: 1.3rem;">وللل صحيتيييي و شكراا😖💖</p>
            <button class="btn btn-back" onclick="location.reload()">البداية</button>
        </div>
    </div>

    <div id="step-final" class="step hidden">
        <div class="final-card">
            <p id="final-message"></p>
            <button class="btn btn-back" onclick="location.reload()">رجوع</button>
        </div>
    </div>

    <script>
        // تأثيرات عشوائية كثيفة جداً
        function spawnEffect(type) {
            const icons = { hearts: ['❤️','💖','✨'], tears: ['💧','😔','😭'], fire: ['🔥','💥','⚡'], magic: ['✨','🌟','💎'] };
            const list = icons[type] || ['✨'];
            for (let i = 0; i < 70; i++) {
                const el = document.createElement('div');
                el.className = 'effect';
                el.innerText = list[Math.floor(Math.random() * list.length)];
                el.style.left = '50vw'; el.style.top = '50vh';
                el.style.fontSize = (Math.random() * 25 + 15) + 'px';
                const randomX = (Math.random() * 240 - 120) + 'vw';
                const randomY = (Math.random() * 240 - 120) + 'vh';
                const randomRotate = (Math.random() * 1080 - 540) + 'deg';
                el.style.setProperty('--tx', randomX);
                el.style.setProperty('--ty', randomY);
                el.style.setProperty('--tr', randomRotate);
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }
        }

        function btnAction(effect, next, extra) {
            spawnEffect(effect);
            if(extra === 'lara') document.getElementById('final-message').innerText = "اخرجي من الموقع نكره الاسم اذا موتي";
            if(extra === 'noGame') document.getElementById('final-message').innerText = "معليش ارجعي وقت ما تبغي تلعبي";
            if(extra === 'initGame') resetGame();
            setTimeout(() => navigate(next), 400);
        }

        function navigate(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        let giftIdx = 0;
        function resetGame() {
            giftIdx = Math.floor(Math.random() * 3);
            document.getElementById('win-btn').classList.add('hidden');
            document.querySelectorAll('.box').forEach(b => { b.innerText = "؟"; b.style.background = "#1a1f29"; });
            document.getElementById('game-status').innerText = "";
        }

        function checkGame(i) {
            const b = document.getElementById('box'+i);
            if(i === giftIdx) {
                b.innerText = "💎"; b.style.background = "#28a745";
                document.getElementById('game-status').innerText = "لقيتيهاااا!";
                confetti({ particleCount: 300, spread: 100 });
                document.getElementById('win-btn').classList.remove('hidden');
            } else {
                b.innerText = "👻"; b.style.background = "#dc3545";
                spawnEffect('tears');
            }
        }

        function showForbidden() {
            const t = document.getElementById('toast');
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 2000);
        }

        // إنشاء النجوم الخلفية
        for (let i = 0; i < 150; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random() * 3 + 1 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(s);
        }
    </script>
</body>
        </html>
